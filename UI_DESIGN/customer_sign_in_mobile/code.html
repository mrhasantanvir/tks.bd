<div class="w-full flex flex-col items-center pt-xl">

<span class="material-symbols-outlined text-primary text-[48px]" data-icon="agriculture" style="font-variation-settings: 'FILL' 1;">agriculture</span>

<h1 class="font-display-lg text-headline-md text-primary-container tracking-tighter mb-xs">Harvest &amp; Hearth</h1>
<p class="font-body-md text-on-surface-variant opacity-75">Traceable. Transparent. Timely.</p>

<main class="w-full max-w-sm flex flex-col gap-md">
<div class="bg-surface-container-lowest p-gutter rounded-xl shadow-sm border border-outline-variant/30">
<h2 class="font-headline-sm text-on-surface mb-lg">Sign In</h2>
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-body-md" id="email" name="email" placeholder="farmer@tks.bd" required="" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-primary-container hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 pt-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-label-sm text-on-surface-variant" for="remember">Remember device for 30 days</label>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-label-md rounded-lg shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-sm mt-md" type="submit">
                    Secure Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-lg flex items-center gap-md">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-outline">or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="mt-md grid grid-cols-2 gap-sm">
<button class="h-12 border border-outline-variant rounded-lg flex items-center justify-center gap-xs font-label-sm hover:bg-surface-container-low transition-colors">

<span class="material-symbols-outlined text-on-surface" data-icon="fingerprint">fingerprint</span>
                    Biometric

</div>
</div>
